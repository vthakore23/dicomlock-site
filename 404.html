<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — DicomLock</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#0b0b0c" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .nf {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      gap: 1.1rem;
    }
    .nf .logo { margin-bottom: 0.6rem; }
    .nf-code {
      font-family: var(--mono);
      font-size: 0.76rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .nf h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }
    .nf p { color: var(--text-muted); max-width: 440px; line-height: 1.6; }
    .nf .btn-primary { margin-top: 0.6rem; }
  </style>
</head>
<body>
  <main class="nf">
    <a href="/" class="logo" aria-label="DicomLock home">
      <div class="logo-icon">
        <svg width="30" height="30" viewBox="0 0 28 28" fill="none">
          <path d="M14 2L4 7v7c0 6.5 4.3 12.6 10 14 5.7-1.4 10-7.5 10-14V7L14 2z" stroke="#2dd4bf" stroke-width="2" fill="none"/>
          <path d="M10 14l3 3 5-6" stroke="#2dd4bf" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </a>
    <div class="nf-code">Error 404</div>
    <h1>Page not found</h1>
    <p>The page you are looking for does not exist or has moved.</p>
    <a href="/" class="btn-primary">
      Back to home
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M3 8h10m-4-4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
  </main>
</body>
</html>
